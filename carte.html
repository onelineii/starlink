<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink - Lier Carte</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; background-color: #0f172a; color: #fff; padding-bottom: 80px; }

        /* En-tête */
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #38bdf8;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #38bdf8;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 13px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: #1e293b;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .form-control:focus {
            border-color: #7dd3fc;
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Navigation Basse */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid #38bdf8;
        }
        .nav-item { text-decoration: none; color: #94a3b8; text-align: center; font-size: 11px; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-credit-card"></i> Lier une carte de retrait
    </div>

    <div class="container">
        <p style="font-size: 12px; color: #94a3b8; text-align: center; margin-bottom: 25px;">
            Veuillez enregistrer les informations exactes de votre compte Mobile Money. L'argent de vos retraits y sera envoyé.
        </p>

        <form id="carteForm">
            <div class="form-group">
                <label>Réseau Mobile Money</label>
                <select id="network" class="form-control" required>
                    <option value="M-Pesa">M-Pesa</option>
                    <option value="Orange Money">Orange Money</option>
                    <option value="Airtel Money">Airtel Money</option>
                    <option value="Afrimoney">Afrimoney</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nom complet (enregistré sur le numéro)</label>
                <input type="text" id="nomCarte" class="form-control" placeholder="Ex: Jean Dupont" required>
            </div>

            <div class="form-group">
                <label>Numéro de téléphone de réception</label>
                <input type="tel" id="numCarte" class="form-control" placeholder="Ex: 082XXXXXXX" required>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">Enregistrer la carte</button>
        </form>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home nav-icon"></i>Accueil</a>
        <a href="produit.html" class="nav-item"><i class="fas fa-box nav-icon"></i>Plans</a>
        <a href="equipe.html" class="nav-item"><i class="fas fa-users nav-icon"></i>Équipe</a>
        <a href="profil.html" class="nav-item"><i class="fas fa-user nav-icon"></i>Moi</a>
    </nav>

    <script>
        const userPhone = localStorage.getItem('userPhone');
        if (!userPhone) {
            window.location.href = 'index.html';
        }

        const mainBaseUrl = "https://canal-e4274-default-rtdb.firebaseio.com";

        // Vérifie si la carte est déjà liée pour afficher les infos
        async function verifierCarteExistante() {
            try {
                const response = await fetch(`${mainBaseUrl}/users/${userPhone}/carte.json`);
                const carte = await response.json();
                
                if (carte) {
                    document.getElementById('network').value = carte.network;
                    document.getElementById('nomCarte').value = carte.nom;
                    document.getElementById('numCarte').value = carte.numero;
                    document.getElementById('btnSubmit').innerText = "Mettre à jour la carte";
                }
            } catch (error) {
                console.error("Erreur de chargement de la carte", error);
            }
        }

        verifierCarteExistante();

        // Enregistrement de la carte
        document.getElementById('carteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "Traitement en cours...";
            btnSubmit.disabled = true;

            const data = {
                network: document.getElementById('network').value,
                nom: document.getElementById('nomCarte').value,
                numero: document.getElementById('numCarte').value
            };

            try {
                // Utilisation de PUT pour créer ou écraser les anciennes données de carte
                await fetch(`${mainBaseUrl}/users/${userPhone}/carte.json`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                
                alert("Compte de réception lié avec succès !");
                window.location.href = "retrait.html"; // Redirection immédiate vers le retrait
            } catch (error) {
                alert("Erreur de connexion. Veuillez réessayer.");
                btnSubmit.innerText = "Enregistrer la carte";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
