<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Équipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">

    <h2 class="text-xl font-bold mb-4 text-sky-400 uppercase italic">Mon Équipe</h2>
    <div id="equipe-container" class="space-y-3">
        </div>

    <div id="detailsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm border border-sky-500">
            <h3 id="modalTitle" class="text-lg font-bold text-white mb-4">Détails</h3>
            <p id="modalBody" class="text-slate-300 text-sm mb-6"></p>
            <button onclick="document.getElementById('detailsModal').classList.add('hidden')" class="w-full bg-sky-600 py-2 rounded-lg font-bold">Fermer</button>
        </div>
    </div>

    <script>
        const mainBaseUrl = "https://canal-e4274-default-rtdb.firebaseio.com";
        const userPhone = localStorage.getItem('userPhone');

        async function fetchEquipe() {
            const container = document.getElementById('equipe-container');
            container.innerHTML = "<p class='text-center'>Chargement...</p>";

            try {
                const res = await fetch(`${mainBaseUrl}/users.json`);
                const allUsers = await res.json();
                let html = "";
                let found = false;

                for (let phone in allUsers) {
                    let user = allUsers[phone];
                    
                    // On vérifie si le parrain est bien l'utilisateur connecté
                    if (user.referredBy === userPhone) {
                        found = true;
                        html += `
                            <div onclick="showDetails('${phone}', ${user.balance || 0})" 
                                 class="bg-slate-800 p-4 rounded-lg border-l-4 border-sky-500 cursor-pointer hover:bg-slate-700 transition">
                                <p class="font-bold text-lg">${phone}</p>
                                <p class="text-xs text-sky-400 uppercase">Cliquez pour voir le solde</p>
                            </div>
                        `;
                    }
                }
                container.innerHTML = found ? html : "<p class='text-center text-slate-500'>Aucun filleul pour le moment.</p>";
            } catch (e) {
                container.innerHTML = "<p class='text-red-500'>Erreur de chargement.</p>";
            }
        }

        function showDetails(phone, balance) {
            document.getElementById('modalTitle').innerText = "Membre : " + phone;
            document.getElementById('modalBody').innerText = "Solde actuel du membre : " + balance.toLocaleString() + " FC";
            document.getElementById('detailsModal').classList.remove('hidden');
        }

        fetchEquipe();
    </script>
</body>
</html>
