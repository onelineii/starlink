<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink - Historique Équipe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; background-color: #0f172a; color: #fff; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #fff; padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 3px solid #38bdf8; }
        .header a { color: #38bdf8; text-decoration: none; }
        .container { padding: 20px; }
        .team-investment-box { background: #1e293b; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 25px; border: 1px solid #38bdf8; }
        .team-investment-box h2 { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #38bdf8; }
        .tabs { display: flex; background: #1e293b; border-radius: 10px; padding: 5px; margin-bottom: 20px; border: 1px solid #38bdf8; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-weight: bold; color: #94a3b8; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; }
        .member-list { display: none; flex-direction: column; gap: 12px; }
        .member-list.active { display: flex; }
        .member-card { background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <a href="equipe.html"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size: 18px; margin:0;">Historique de l'Équipe</h1>
    </div>

    <div class="container">
        <div class="team-investment-box">
            <span>Investissement Total</span>
            <h2 id="totalTeamInvestment">0 FC</h2>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'lv1')">Lv 1</button>
            <button class="tab-btn" onclick="switchTab(event, 'lv2')">Lv 2</button>
            <button class="tab-btn" onclick="switchTab(event, 'lv3')">Lv 3</button>
        </div>
        <div id="lv1" class="member-list active"></div>
        <div id="lv2" class="member-list"></div>
        <div id="lv3" class="member-list"></div>
    </div>

    <script>
        const dbUrl = "https://canal-e4274-default-rtdb.firebaseio.com";
        const userPhone = localStorage.getItem('userPhone');

        function switchTab(e, id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.member-list').forEach(l => l.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        async function loadTeamHistory() {
            try {
                const uRes = await fetch(`${dbUrl}/users.json`);
                const pRes = await fetch(`${dbUrl}/purchases.json`);
                const users = await uRes.json();
                const purchases = await pRes.json();
                
                if (!users) return;

                let total = 0;
                let lv1Phones = [], lv2Phones = [];

                const getInvestment = (phone) => {
                    if (!purchases || !purchases[phone]) return 0;
                    let sum = 0;
                    Object.values(purchases[phone]).forEach(p => sum += parseFloat(p.price || 0));
                    return sum;
                };

                const fill = (id, phone, inv) => {
                    document.getElementById(id).innerHTML += `
                        <div class="member-card">
                            <div><h4>${phone}</h4><p>Investi: ${inv.toLocaleString()} FC</p></div>
                            <div style="color:${inv>0?'#34d399':'#f87171'}">${inv>0?'VIP':'Inactif'}</div>
                        </div>`;
                };

                // Tri par niveau
                for (let phone in users) {
                    let u = users[phone];
                    let inv = getInvestment(phone);

                    if (u.referredBy === userPhone) {
                        lv1Phones.push(phone);
                        total += inv;
                        fill('lv1', phone, inv);
                    }
                }
                
                lv1Phones.forEach(p1 => {
                    for (let phone in users) {
                        if (users[phone].referredBy === p1) {
                            lv2Phones.push(phone);
                            let inv = getInvestment(phone);
                            total += inv;
                            fill('lv2', phone, inv);
                        }
                    }
                });

                lv2Phones.forEach(p2 => {
                    for (let phone in users) {
                        if (users[phone].referredBy === p2) {
                            let inv = getInvestment(phone);
                            total += inv;
                            fill('lv3', phone, inv);
                        }
                    }
                });

                document.getElementById('totalTeamInvestment').innerText = total.toLocaleString() + " FC";
            } catch (e) { console.error("Erreur:", e); }
        }
        loadTeamHistory();
    </script>
</body>
</html>
