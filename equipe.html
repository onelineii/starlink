<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink - Équipe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; background-color: #0f172a; color: #fff; padding-bottom: 80px; }
        .team-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #fff; padding: 40px 20px; text-align: center; border-bottom: 3px solid #38bdf8; }
        .team-header h1 { margin: 0; font-size: 24px; text-transform: uppercase; }
        .commission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; margin-top: -30px; }
        .comm-card { background: #1e293b; padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #38bdf8; }
        .lv-badge { display: inline-block; background: #38bdf8; color: #0f172a; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 12px; margin-bottom: 8px; }
        .comm-rate { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #38bdf8; }
        .comm-stats { font-size: 10px; color: #cbd5e1; line-height: 1.4; }
        .invite-section { background: #1e293b; margin: 0 20px; padding: 20px; border-radius: 15px; border: 1px solid #38bdf8; }
        .copy-box { display: flex; align-items: center; background: #0f172a; padding: 10px 15px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #38bdf8; }
        .copy-text { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-copy { background: #38bdf8; color: #0f172a; border: none; padding: 6px 15px; border-radius: 15px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #38bdf8; }
        .nav-item { text-decoration: none; color: #94a3b8; text-align: center; font-size: 11px; }
        .nav-item.active { color: #38bdf8; }
    </style>
</head>
<body>

    <div class="team-header">
        <h1>STARLINK TEAM</h1>
    </div>

    <div class="commission-grid">
        <div class="comm-card"><div class="lv-badge">Lv1</div><div class="comm-rate">25%</div><div class="comm-stats">Membres: <span id="countLv1">0</span><br><span id="rewardLv1">0 FC</span></div></div>
        <div class="comm-card"><div class="lv-badge">Lv2</div><div class="comm-rate">2%</div><div class="comm-stats">Membres: <span id="countLv2">0</span><br><span id="rewardLv2">0 FC</span></div></div>
        <div class="comm-card"><div class="lv-badge">Lv3</div><div class="comm-rate">1%</div><div class="comm-stats">Membres: <span id="countLv3">0</span><br><span id="rewardLv3">0 FC</span></div></div>
    </div>

    <div class="invite-section">
        <div class="copy-box"><div class="copy-text" id="inviteCode">Chargement...</div><button class="btn-copy" onclick="copyText('inviteCode')">Copier Code</button></div>
        <div class="copy-box"><div class="copy-text" id="inviteLink">Chargement...</div><button class="btn-copy" onclick="copyText('inviteLink')">Copier Lien</button></div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home fa-lg"></i><br>Accueil</a>
        <a href="produit.html" class="nav-item"><i class="fas fa-box fa-lg"></i><br>Plans</a>
        <a href="equipe.html" class="nav-item active"><i class="fas fa-users fa-lg"></i><br>Équipe</a>
        <a href="profil.html" class="nav-item"><i class="fas fa-user fa-lg"></i><br>Moi</a>
    </nav>

    <script>
        const dbUrl = "https://canal-e4274-default-rtdb.firebaseio.com/users";
        const userPhone = localStorage.getItem('userPhone');
        if (!userPhone) window.location.href = 'index.html';

        const myCode = userPhone.slice(-6);
        document.getElementById('inviteCode').innerText = myCode;
        document.getElementById('inviteLink').innerText = `https://onelineii.github.io/starlink/register.html?ref=${myCode}`;

        function copyText(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("Copié !");
        }

        async function loadTeamData() {
            const res = await fetch(`${dbUrl}.json`);
            const users = await res.json();
            if (!users) return;

            let lv1 = [], lv2 = [], lv3 = [];
            let r1 = 0, r2 = 0, r3 = 0;

            // Calcul niveau 1
            for (let id in users) {
                if (users[id].referredBy === myCode) {
                    lv1.push(users[id].phone.slice(-6));
                    r1 += parseFloat(users[id].rewardLv1 || 0);
                }
            }
            // Calcul niveau 2
            for (let id in users) {
                if (lv1.includes(users[id].referredBy)) {
                    lv2.push(users[id].phone.slice(-6));
                    r2 += parseFloat(users[id].rewardLv2 || 0);
                }
            }
            // Calcul niveau 3
            for (let id in users) {
                if (lv2.includes(users[id].referredBy)) {
                    lv3.push(users[id].phone.slice(-6));
                    r3 += parseFloat(users[id].rewardLv3 || 0);
                }
            }

            document.getElementById('countLv1').innerText = lv1.length;
            document.getElementById('rewardLv1').innerText = r1.toLocaleString() + " FC";
            document.getElementById('countLv2').innerText = lv2.length;
            document.getElementById('rewardLv2').innerText = r2.toLocaleString() + " FC";
            document.getElementById('countLv3').innerText = lv3.length;
            document.getElementById('rewardLv3').innerText = r3.toLocaleString() + " FC";
        }
        loadTeamData();
    </script>
</body>
</html>
