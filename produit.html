<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink - Produits</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; background-color: #0f172a; color: #fff; padding-bottom: 80px; }

        .hero-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #38bdf8;
            padding: 30px 20px 60px;
            text-align: center;
            border-bottom: 3px solid #38bdf8;
        }
        .hero-header h1 { margin: 0; font-size: 28px; letter-spacing: 3px; color: #fff; text-transform: uppercase; }

        .counter-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 20px;
            margin-top: -40px;
            position: relative;
            z-index: 10;
        }
        .counter-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #38bdf8;
            text-decoration: none;
            color: #fff;
        }

        .product-list { padding: 20px; }

        .vip-card {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #38bdf8;
            margin-bottom: 20px;
            display: flex;
            overflow: hidden;
        }

        .vip-infos { flex: 1; padding: 15px; }
        .vip-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #38bdf8; }
        .vip-data { font-size: 12px; color: #cbd5e1; line-height: 1.5; }
        .vip-data div { display: flex; justify-content: space-between; margin-bottom: 3px; }

        .vip-action {
            width: 110px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #38bdf8;
        }
        .vip-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #38bdf8;
        }
        .btn-buy {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 8px 0;
            border-radius: 20px;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid #38bdf8;
        }
        .nav-item { text-decoration: none; color: #94a3b8; text-align: center; font-size: 11px; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="hero-header">
        <h1>STARLINK PLANS</h1>
    </div>

    <div class="counter-section">
        <a href="mes-produits.html" class="counter-box"><strong id="prodCount">0</strong><span>Mes produits</span></a>
        <a href="mes-produits.html" class="counter-box"><strong id="totalEarn">FC 0</strong><span>Revenus cumulés</span></a>
    </div>

    <div class="product-list">
        <script>
            const plans = [
                {n:"VIP1 Start", p:15000, d:4500, t:405000},
                {n:"VIP2 Basic", p:30000, d:9300, t:837000},
                {n:"VIP3 Medium", p:60000, d:19200, t:1728000},
                {n:"VIP4 Pro", p:120000, d:39600, t:3564000},
                {n:"VIP5 Elite", p:250000, d:85000, t:7650000},
                {n:"VIP6 Business", p:450000, d:157500, t:14175000},
                {n:"VIP7 Master", p:1000000, d:360000, t:32400000},
                {n:"VIP8 Ultimate", p:2000000, d:800000, t:72000000}
            ];

            plans.forEach(plan => {
                document.write(`
                    <div class="vip-card">
                        <div class="vip-infos">
                            <div class="vip-title">STARLINK ${plan.n}</div>
                            <div class="vip-data">
                                <div><span>Prix:</span> <b>${plan.p.toLocaleString()} FC</b></div>
                                <div><span>Quotidien:</span> <b>${plan.d.toLocaleString()} FC</b></div>
                                <div><span>Total:</span> <b>${plan.t.toLocaleString()} FC</b></div>
                                <div><span>Durée:</span> <b>90 jours</b></div>
                            </div>
                        </div>
                        <div class="vip-action">
                            <img src="IMG_6038.jpeg" class="vip-image">
                            <button class="btn-buy" onclick="buyProduct('${plan.n}', ${plan.p}, ${plan.d})">Acheter</button>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home nav-icon"></i>Accueil</a>
        <a href="produit.html" class="nav-item active"><i class="fas fa-box nav-icon"></i>Plans</a>
        <a href="equipe.html" class="nav-item"><i class="fas fa-users nav-icon"></i>Équipe</a>
        <a href="profil.html" class="nav-item"><i class="fas fa-user nav-icon"></i>Moi</a>
    </nav>

    <script>
        const mainBaseUrl = "https://canal-e4274-default-rtdb.firebaseio.com";
        const dbUrl = `${mainBaseUrl}/users`;
        const userPhone = localStorage.getItem('userPhone');

        if (!userPhone) { window.location.href = 'index.html'; }

        async function buyProduct(name, price, daily) {
            try {
                const response = await fetch(`${dbUrl}/${userPhone}.json`);
                const currentUser = await response.json();
                
                if (currentUser && (currentUser.balance >= price)) {
                    await fetch(`${dbUrl}/${userPhone}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ balance: currentUser.balance - price, hasPurchased: true })
                    });
                    
                    await fetch(`${mainBaseUrl}/purchases/${userPhone}.json`, {
                        method: 'POST',
                        body: JSON.stringify({ name, price, dailyIncome: daily, purchaseDate: new Date().toISOString() })
                    });

                    if (currentUser.referredBy) {
                        const allUsersRes = await fetch(`${dbUrl}.json`);
                        const allUsers = await allUsersRes.json();
                        
                        const parrainLv1 = Object.values(allUsers).find(u => u.phone && u.phone.slice(-6) === currentUser.referredBy);
                        if (parrainLv1) {
                            const comLv1 = price * 0.25;
                            await fetch(`${dbUrl}/${parrainLv1.phone}.json`, {
                                method: 'PATCH',
                                body: JSON.stringify({ 
                                    gainParrainageLv1: (parseFloat(parrainLv1.gainParrainageLv1 || 0) + comLv1),
                                    balance: (parseFloat(parrainLv1.balance || 0) + comLv1)
                                })
                            });

                            if (parrainLv1.referredBy) {
                                const parrainLv2 = Object.values(allUsers).find(u => u.phone && u.phone.slice(-6) === parrainLv1.referredBy);
                                if (parrainLv2) {
                                    const comLv2 = price * 0.02;
                                    await fetch(`${dbUrl}/${parrainLv2.phone}.json`, {
                                        method: 'PATCH',
                                        body: JSON.stringify({ 
                                            gainParrainageLv2: (parseFloat(parrainLv2.gainParrainageLv2 || 0) + comLv2),
                                            balance: (parseFloat(parrainLv2.balance || 0) + comLv2)
                                        })
                                    });

                                    if (parrainLv2.referredBy) {
                                        const parrainLv3 = Object.values(allUsers).find(u => u.phone && u.phone.slice(-6) === parrainLv2.referredBy);
                                        if (parrainLv3) {
                                            const comLv3 = price * 0.01;
                                            await fetch(`${dbUrl}/${parrainLv3.phone}.json`, {
                                                method: 'PATCH',
                                                body: JSON.stringify({ 
                                                    gainParrainageLv3: (parseFloat(parrainLv3.gainParrainageLv3 || 0) + comLv3),
                                                    balance: (parseFloat(parrainLv3.balance || 0) + comLv3)
                                                })
                                            });
                                        }
                                    }
                                }
                            }
                        }
                    }

                    alert("Achat Starlink réussi !");
                    location.reload();
                } else { alert("Solde insuffisant !"); }
            } catch (e) { alert("Erreur réseau."); }
        }

        fetch(`${dbUrl}/${userPhone}.json`).then(r=>r.json()).then(u => {
            document.getElementById('totalEarn').innerText = "FC " + (u.earnings || 0).toLocaleString();
        });
        fetch(`${mainBaseUrl}/purchases/${userPhone}.json`).then(r=>r.json()).then(p => {
            document.getElementById('prodCount').innerText = p ? Object.keys(p).length : 0;
        });
    </script>
</body>
</html>
