<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink - Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; background-color: #0f172a; color: #fff; padding-bottom: 80px; }

        /* En-tête Profil */
        .profile-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            padding: 40px 20px;
            border-bottom: 3px solid #38bdf8;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info i { font-size: 50px; color: #38bdf8; }
        .phone-num { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        .level-badge {
            background: #38bdf8;
            color: #0f172a;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

        /* Actions rapides */
        .quick-actions {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            margin: -20px 20px 20px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #38bdf8;
        }
        .action-item { text-decoration: none; color: #cbd5e1; text-align: center; font-size: 12px; }
        .action-item i { font-size: 20px; display: block; margin-bottom: 5px; color: #38bdf8; }

        /* Section Solde */
        .wallet-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }
        .wallet-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #38bdf8;
            text-decoration: none;
            color: inherit;
        }
        .wallet-card h3 { margin: 0; font-size: 15px; font-weight: bold; color: #38bdf8; }
        .wallet-card p { margin: 5px 0 0; font-size: 11px; color: #94a3b8; }

        /* Grille des Services */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: 10px;
        }
        .service-item {
            text-align: center;
            text-decoration: none;
            color: #cbd5e1;
            font-size: 10px;
            cursor: pointer;
        }
        .service-icon {
            width: 45px;
            height: 45px;
            background: #1e293b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 18px;
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }

        /* Navigation Basse */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid #38bdf8;
        }
        .nav-item { text-decoration: none; color: #94a3b8; text-align: center; font-size: 11px; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <div>
                <div class="phone-num" id="displayPhone">Chargement...</div>
                <div class="level-badge" id="displayVIP">VIP 0</div>
            </div>
        </div>
    </div>

    <div class="quick-actions">
        <a href="recharge.html" class="action-item"><i class="fas fa-wallet"></i>Recharger</a>
        <a href="retrait.html" class="action-item"><i class="fas fa-hand-holding-usd"></i>Retrait</a>
        <a href="historique.html" class="action-item"><i class="fas fa-list-ul"></i>Historique</a>
    </div>

    <div class="wallet-section">
        <a href="historique.html" class="wallet-card">
            <h3 id="walletBalance">0 FC</h3>
            <p>Solde</p>
        </a>
        <a href="mes-produits.html" class="wallet-card">
            <h3 id="walletEarnings">0 FC</h3>
            <p>Revenus</p>
        </a>
    </div>

    <div class="services-grid">
        <a href="a-propos.html" class="service-item"><div class="service-icon"><i class="fas fa-info-circle"></i></div>À propos</a>
        <a href="regles.html" class="service-item"><div class="service-icon"><i class="fas fa-file-alt"></i></div>Règles</a>
        <a href="https://t.me/serv0754" class="service-item"><div class="service-icon"><i class="fas fa-headset"></i></div>Support</a>
        <a href="#" class="service-item"><div class="service-icon"><i class="fas fa-download"></i></div>App</a>
        <a href="#" class="service-item"><div class="service-icon"><i class="fas fa-credit-card"></i></div>Carte</a>
        <a href="#" class="service-item"><div class="service-icon"><i class="fas fa-key"></i></div>Sécurité</a>
        <a href="taches.html" class="service-item"><div class="service-icon"><i class="fas fa-gift"></i></div>Cadeau</a>
        <div onclick="logout()" class="service-item"><div class="service-icon" style="color: #f87171;"><i class="fas fa-sign-out-alt"></i></div>Quitter</div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home nav-icon"></i>Accueil</a>
        <a href="produit.html" class="nav-item"><i class="fas fa-box nav-icon"></i>Plans</a>
        <a href="equipe.html" class="nav-item"><i class="fas fa-users nav-icon"></i>Équipe</a>
        <a href="profil.html" class="nav-item active"><i class="fas fa-user nav-icon"></i>Moi</a>
    </nav>

    <script>
        const mainBaseUrl = "https://canal-e4274-default-rtdb.firebaseio.com";
        const dbUrl = `${mainBaseUrl}/users`;
        const userPhone = localStorage.getItem('userPhone');

        if (!userPhone) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('displayPhone').innerText = userPhone;
        }

        async function loadProfileData() {
            try {
                const response = await fetch(`${dbUrl}/${userPhone}.json`);
                const currentUser = await response.json();

                if (currentUser) {
                    document.getElementById('walletBalance').innerText = (currentUser.balance || 0).toLocaleString() + " FC";
                    document.getElementById('walletEarnings').innerText = (currentUser.earnings || 0).toLocaleString() + " FC";
                    
                    const prodRes = await fetch(`${mainBaseUrl}/purchases/${userPhone}.json`);
                    const products = await prodRes.json();
                    document.getElementById('displayVIP').innerText = "VIP " + (products ? Object.keys(products).length : 0);
                }
            } catch (error) { console.error(error); }
        }

        function logout() {
            if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.removeItem('userPhone');
                window.location.href = 'index.html';
            }
        }

        loadProfileData();
    </script>
</body>
</html>
