<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink - Retrait & Historique</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .box { background: #fff; color: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn-retrait { width: 100%; padding: 15px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .id-input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: #38bdf8;">Starlink Retraits</h1>

    <div class="box">
        <h2>Effectuer un retrait</h2>
        <div id="infoCarte" style="background: #e2e8f0; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #38bdf8;">
            <p style="font-size: 13px; text-align: center; margin: 0; color: #333;">Vérification de votre compte de réception...</p>
        </div>

        <p style="font-size: 12px; color: #666;">Frais: 15% | Min: 5 000 CDF | 09h-17h</p>
        <input type="number" id="montantRet" placeholder="Montant à retirer" class="id-input" oninput="calculerNet()">
        <p>Montant net à recevoir : <strong id="montantNet">0</strong> CDF</p>
        <button class="btn-retrait" onclick="soumettreRetrait()">Confirmer le Retrait</button>
    </div>

    <div class="box">
        <h2>Historique des transactions</h2>
        <div id="historiqueList"></div>
    </div>
</div>

<script>
    const userPhone = localStorage.getItem('userPhone');
    if (!userPhone) window.location.href = 'index.html';

    const firebaseConfig = { databaseURL: "https://canal-e4274-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let carteLiee = null;

    db.ref('users/' + userPhone + '/carte').once('value').then((snapshot) => {
        if (!snapshot.exists()) {
            alert("Vous devez d'abord lier un compte Mobile Money pour retirer.");
            window.location.href = 'carte.html';
        } else {
            carteLiee = snapshot.val();
            document.getElementById('infoCarte').innerHTML = `
                <div style="font-size: 13px; color: #000;">
                    <strong>Compte de réception :</strong><br>
                    <span style="color: #0284c7; font-weight: bold;">${carteLiee.network}</span> - ${carteLiee.numero}<br>
                    <em>Nom : ${carteLiee.nom}</em>
                </div>
            `;
        }
    });

    function calculerNet() {
        const brut = document.getElementById('montantRet').value;
        document.getElementById('montantNet').innerText = (brut * 0.85).toLocaleString();
    }

    function soumettreRetrait() {
        const montant = parseFloat(document.getElementById('montantRet').value);
        const hour = new Date().getHours();

        if (isNaN(montant) || montant < 5000) { alert("Le minimum est de 5 000 CDF"); return; }
        if (hour < 9 || hour >= 17) { alert("Service fermé. Horaire: 09h à 17h."); return; }
        if (!carteLiee) { alert("Erreur: Carte non chargée."); return; }

        // Vérification sécurisée du solde avant de valider
        db.ref('users/' + userPhone + '/balance').once('value').then((snapshot) => {
            const soldeActuel = parseFloat(snapshot.val() || 0);

            if (soldeActuel < montant) {
                alert("Solde insuffisant ! Votre solde est de " + soldeActuel.toLocaleString() + " CDF.");
                return;
            }

            const data = {
                telephone_compte: userPhone,
                reseau_reception: carteLiee.network,
                numero_reception: carteLiee.numero,
                nom_reception: carteLiee.nom,
                type: "Retrait",
                montant_brut: montant,
                montant_net: montant * 0.85,
                statut: "En attente",
                date: new Date().toLocaleString()
            };

            // Déduire le solde et enregistrer le retrait
            db.ref('users/' + userPhone + '/balance').set(soldeActuel - montant).then(() => {
                db.ref('retraits/' + userPhone).push(data).then(() => {
                    alert("Demande de retrait envoyée !");
                    location.reload();
                });
            });
        });
    }

    db.ref('retraits/' + userPhone).limitToLast(5).on('value', (snapshot) => {
        const container = document.getElementById('historiqueList');
        container.innerHTML = "";
        snapshot.forEach((child) => {
            const tr = child.val();
            container.innerHTML += `<div class="history-item">
                ${tr.date} - <strong>${tr.montant_brut} CDF</strong> (${tr.statut})
            </div>`;
        });
    });
</script>
</body>
</html>
